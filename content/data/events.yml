  description: "Invited as a delegate to Google's India Web Community Leaders Summit 2019, a two-day closed gathering of web community leads, Google Developer Experts, and ecosystem influencers from across India. Sessions covered Chrome's 2020 roadmap by Paul Kinlan, Lighthouse CI, Progressive Web Apps, and the state of the web platform, with the overarching theme of growing impactful technical communities across the country. Day 2 wrapped up with a networking dinner and karaoke evening at the Conrad Bengaluru."
